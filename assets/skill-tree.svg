  <text x="30" y="85" font-family="Trebuchet MS, sans-serif" font-size="13" fill="#e9d5ff">React</text>
  <text x="264" y="85" text-anchor="end" font-family="Consolas, monospace" font-size="12" fill="#A78BFA">80%</text>
  <rect x="30" y="91" width="220" height="8" rx="4" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1"/>
