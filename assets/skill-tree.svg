<svg width="700" height="320" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="50%" stop-color="#150a30"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <linearGradient id="borderGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="softGlow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="696" height="316" rx="10" fill="url(#bgGrad4)" stroke="url(#borderGrad4)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0" width="3" height="316" fill="#A78BFA" opacity="0.35" filter="url(#glow4)">
    <animate attributeName="x" values="0;697;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <path d="M14 14 L14 26 M14 14 L26 14" stroke="#A78BFA" stroke-width="2" filter="url(#softGlow4)"/>
  <path d="M686 14 L686 26 M686 14 L674 14" stroke="#A78BFA" stroke-width="2" filter="url(#softGlow4)"/>
  <path d="M14 306 L14 294 M14 306 L26 306" stroke="#A78BFA" stroke-width="2" filter="url(#softGlow4)"/>
  <path d="M686 306 L686 294 M686 306 L674 306" stroke="#A78BFA" stroke-width="2" filter="url(#softGlow4)"/>

  <text x="30" y="38" font-family="Trebuchet MS, sans-serif" font-size="15" letter-spacing="3" fill="#A78BFA" filter="url(#softGlow4)">
    [ ARISE — SKILL TREE ]
    <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
  </text>

  <line x1="350" y1="55" x2="350" y2="300" stroke="#4c1d95" stroke-width="1.5"/>

  <!-- COLUMN HEADERS -->
